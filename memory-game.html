<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hafıza Kartı Oyunu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    font-family: 'Segoe UI', sans-serif;
    color: #eee;
    padding: 20px;
  }

  h1 {
    font-size: 1.8rem;
    margin-bottom: 16px;
    letter-spacing: 1px;
    color: #e0aaff;
  }

  .stats {
    display: flex;
    gap: 32px;
    margin-bottom: 24px;
    font-size: 1rem;
  }

  .stat {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 10px;
    padding: 8px 20px;
    text-align: center;
  }

  .stat-label {
    font-size: 0.7rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .stat-value {
    font-size: 1.4rem;
    font-weight: bold;
    color: #e0aaff;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 90px);
    grid-template-rows: repeat(4, 90px);
    gap: 12px;
  }

  .card {
    width: 90px;
    height: 90px;
    cursor: pointer;
    perspective: 600px;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 14px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-front {
    background: linear-gradient(135deg, #0f3460, #16213e);
    border: 2px solid #0f3460;
    font-size: 2rem;
    color: #334;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  }

  .card-front::after {
    content: '?';
    font-size: 2rem;
    color: #3a506b;
    font-weight: bold;
  }

  .card-back {
    background: linear-gradient(135deg, #2d1b69, #11998e);
    border: 2px solid #e0aaff55;
    font-size: 2.6rem;
    transform: rotateY(180deg);
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  }

  .card.matched .card-back {
    background: linear-gradient(135deg, #134e5e, #71b280);
    border-color: #71b28088;
    animation: pulse 0.4s ease;
  }

  .card.no-match .card-inner {
    animation: shake 0.4s ease;
  }

  @keyframes pulse {
    0%   { transform: rotateY(180deg) scale(1); }
    50%  { transform: rotateY(180deg) scale(1.15); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  @keyframes shake {
    0%,100% { transform: rotateY(180deg) translateX(0); }
    25%      { transform: rotateY(180deg) translateX(-6px); }
    75%      { transform: rotateY(180deg) translateX(6px); }
  }

  /* Victory overlay */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    align-items: center;
    justify-content: center;
    z-index: 10;
    animation: fadeIn 0.4s ease;
  }

  .overlay.show { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .victory-box {
    background: #16213e;
    border: 2px solid #e0aaff55;
    border-radius: 20px;
    padding: 40px 50px;
    text-align: center;
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .victory-box h2 {
    font-size: 2rem;
    margin-bottom: 8px;
    color: #e0aaff;
  }

  .victory-box p {
    color: #aaa;
    margin-bottom: 6px;
    font-size: 1rem;
  }

  .victory-box .final-stats {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin: 20px 0 28px;
  }

  .final-stat {
    background: #0f3460;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 0.85rem;
  }

  .final-stat span {
    display: block;
    font-size: 1.6rem;
    font-weight: bold;
    color: #e0aaff;
  }

  button {
    background: linear-gradient(135deg, #c77dff, #7b2ff7);
    color: #fff;
    border: none;
    padding: 12px 32px;
    font-size: 1rem;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 15px rgba(199,125,255,0.35);
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(199,125,255,0.5);
  }

  button:active { transform: translateY(0); }
</style>
</head>
<body>

<h1>Hafıza Kartı</h1>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Hamle</div>
    <div class="stat-value" id="moves">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Süre</div>
    <div class="stat-value" id="timer">0:00</div>
  </div>
  <div class="stat">
    <div class="stat-label">Eşleşme</div>
    <div class="stat-value" id="matches">0/8</div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="victory-box">
    <h2>Tebrikler! 🎉</h2>
    <p>Tüm kartları eşleştirdiniz!</p>
    <div class="final-stats">
      <div class="final-stat">Hamle<span id="final-moves">-</span></div>
      <div class="final-stat">Süre<span id="final-time">-</span></div>
    </div>
    <button onclick="startGame()">Tekrar Oyna</button>
  </div>
</div>

<script>
  const EMOJIS = ['🦊','🐬','🦋','🍕','🌈','🎸','🚀','🍀'];

  let cards = [], flipped = [], matched = 0, moves = 0;
  let timerInterval = null, seconds = 0, started = false, locked = false;

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function formatTime(s) {
    return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  }

  function updateStats() {
    document.getElementById('moves').textContent = moves;
    document.getElementById('matches').textContent = `${matched}/8`;
  }

  function startTimer() {
    clearInterval(timerInterval);
    seconds = 0;
    document.getElementById('timer').textContent = '0:00';
    timerInterval = setInterval(() => {
      seconds++;
      document.getElementById('timer').textContent = formatTime(seconds);
    }, 1000);
  }

  function startGame() {
    document.getElementById('overlay').classList.remove('show');
    clearInterval(timerInterval);
    moves = 0; matched = 0; flipped = []; locked = false; started = false;
    updateStats();
    document.getElementById('timer').textContent = '0:00';

    const deck = shuffle([...EMOJIS, ...EMOJIS]);
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    cards = [];

    deck.forEach((emoji, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.emoji = emoji;
      card.dataset.index = i;
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back">${emoji}</div>
        </div>`;
      card.addEventListener('click', () => onCardClick(card));
      grid.appendChild(card);
      cards.push(card);
    });
  }

  function onCardClick(card) {
    if (locked) return;
    if (card.classList.contains('flipped')) return;
    if (card.classList.contains('matched')) return;

    if (!started) {
      started = true;
      startTimer();
    }

    card.classList.add('flipped');
    flipped.push(card);

    if (flipped.length === 2) {
      locked = true;
      moves++;
      updateStats();
      checkMatch();
    }
  }

  function checkMatch() {
    const [a, b] = flipped;
    if (a.dataset.emoji === b.dataset.emoji) {
      // Match
      setTimeout(() => {
        a.classList.add('matched');
        b.classList.add('matched');
        flipped = [];
        locked = false;
        matched++;
        updateStats();
        if (matched === 8) endGame();
      }, 300);
    } else {
      // No match
      a.classList.add('no-match');
      b.classList.add('no-match');
      setTimeout(() => {
        a.classList.remove('flipped', 'no-match');
        b.classList.remove('flipped', 'no-match');
        flipped = [];
        locked = false;
      }, 900);
    }
  }

  function endGame() {
    clearInterval(timerInterval);
    document.getElementById('final-moves').textContent = moves;
    document.getElementById('final-time').textContent = formatTime(seconds);
    setTimeout(() => {
      document.getElementById('overlay').classList.add('show');
    }, 500);
  }

  startGame();
</script>
</body>
</html>
